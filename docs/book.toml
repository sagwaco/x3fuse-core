[book]
title = "x3fuse-core"
description = "Sigma Foveon X3F raw decoder — Rust port"
authors = []
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/sagwaco/x3fuse-core"
edit-url-template = "https://github.com/sagwaco/x3fuse-core/edit/master/docs/{path}"
mathjax-support = false
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
