language = "C"
include_guard = "X3F_FFI_C_H"
documentation = true
documentation_style = "doxy"
cpp_compat = true
style = "type"
no_includes = false
sys_includes = ["stddef.h", "stdint.h"]

# A short header is hand-written into header to make the file self-explanatory
# without forcing readers into the cbindgen docs.
header = """
/*
 * x3f-ffi-c — C ABI for the Rust x3f library.
 *
 * Auto-generated by cbindgen at build time. Do not hand-edit. The Rust
 * source lives in crates/x3f-ffi-c/src/lib.rs; regenerate by running
 * `cargo build -p x3f-ffi-c`.
 *
 * Memory ownership: any pointer returned from this library by an `x3f_*`
 * call MUST be freed by the matching `x3f_*_close` (or equivalent free)
 * function. Callers must NOT mix this library's allocator with their own
 * malloc/free across these handles.
 *
 * Threading: a single `X3FReader` is not internally synchronized; each
 * handle should be used by one thread at a time. Multiple handles may be
 * used in parallel from different threads.
 */
"""

# No `prefix` — Rust source already names types/functions with `X3F` /
# `x3f_` prefixes; cbindgen would otherwise stack-prepend and produce
# `X3FX3FReader`. Keeping the prefix in source also makes our crate's
# names predictable when consumers `use` from Rust directly.
[export]
item_types = ["enums", "structs", "opaque", "functions", "constants"]

[parse]
parse_deps = false
